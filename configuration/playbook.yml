---
- name: Configure SquadHost EC2 Enviornemnt
  hosts: all
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install prerequisite packages
      apt:
        pkg:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - git
          - postgresql-client
          - python3-boto3
          - python3-psycopg2
          - unzip
        state: present

    - name: Download and install AWS CLI v2 natively
      shell: |
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "/tmp/awscliv2.zip"
        cd /tmp
        unzip -o -q awscliv2.zip
        ./aws/install --update
      become: yes

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: deb https://download.docker.com/linux/ubuntu focal stable
        state: present
      
    - name: Install Docker Engine
      apt:
        name: docker-ce
        state: latest

    - name: Ensure Docker is running
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Clone the SquadHost repository
      git:
        repo: 'https://github.com/SeturamanKumar/SquadHost.git'
        dest: /opt/SquadHost
        version: main
        force: yes

    - name: Create backend .env file for Django & RDS
      copy:
        dest: "/opt/SquadHost/.env"
        content: |
          DATABASE_URL=postgres://{{ db_user }}:{{ db_password }}@{{ rds_endpoint }}/postgres
          SECRET_KEY={{ lookup('password', '/dev/null chars=ascii_letters,digits length=50') }}
          DEBUG=False
          ALLOWED_HOSTS={{ inventory_hostname }},localhost,127.0.0.1
          NEXT_PUBLIC_API_URL=http://{{ inventory_hostname }}:8000
          WEBHOOK_SECRET={{ webhook_secret }}

    - name: Inject .env into frontend for NEXT.js build context
      copy:
        src: /opt/SquadHost/.env
        dest: /opt/SquadHost/client/.env
        remote_src: yes
      become: yes

    - name: Build and start the SquadHost application via Docker Compose
      command: docker compose up -d --build
      args:
        chdir: /opt/SquadHost
      become: yes

    - name: Check for existing Database Backup in S3
      command: "aws s3 ls s3://{{ backup_bucket }}/backups/db_restore.sql"
      register: db_backup_exists
      ignore_errors: yes

    - name: Restore Database from S3 if backup exists
      shell: |
        aws s3 cp s3://{{ backup_bucket }}/backups/db_restore.sql /tmp/restore.sql
        PGPASSWORD={{ db_password }} pg_restore -h {{ rds_endpoint.split(':')[0] }} -U {{ db_user }} -d postgres /tmp/restore.sql
      when: db_backup_exists.rc == 0
      become: yes

    - name: Generate Django Database Migrations (The Architect)
      command: docker compose exec -T backend python manage.py makemigrations --noinput
      args:
        chdir: /opt/SquadHost
      become: yes

    - name: Apply Django Database Migrations (The Builder)
      command: docker compose exec -T backend python manage.py migrate
      args:
        chdir: /opt/SquadHost
      become: yes
      register: migrate_result
      until: migrate_result.rc == 0
      retries: 12
      delay: 10

    - name: Ensure the Kamikaze Watchdog is executable
      ansible.builtin.file:
        path: /opt/SquadHost/configuration/kamikaze_watchdog.py
        mode: '0755'
      become: yes

    - name: Start the Macro-Kamikaze Watchdog
      shell: "RDS_HOSTNAME={{ rds_endpoint }} RDS_USERNAME={{ db_user }} RDS_PASSWORD={{ db_password }} BACKUP_BUCKET_NAME={{ backup_bucket }} nohup python3 /opt/SquadHost/configuration/kamikaze_watchdog.py > /var/log/watchdog.log 2>&1 &"
      become: yes